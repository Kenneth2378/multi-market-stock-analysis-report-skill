<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><style>
@page{size:A4;margin:14mm 13mm}*{box-sizing:border-box}body{font-family:"Microsoft YaHei","SimSun",sans-serif;color:#23303f;font-size:10.3pt;line-height:1.58;margin:0}h1{font-size:22pt;color:#102a43;margin:0 0 4px}h2{font-size:14.5pt;color:#174ea6;border-bottom:1px solid #bcccdc;padding-bottom:4px;margin:16px 0 6px}p{margin:4px 0}.meta{color:#52606d;margin-bottom:10px}.hero{background:#eaf2ff;border-left:5px solid #2457c5;padding:10px 13px;margin:9px 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:8px 0}.card{border:1px solid #d9e2ec;padding:7px}.card b{display:block;font-size:13pt;color:#102a43}img{width:100%;max-height:76mm;object-fit:contain;margin:6px 0}.warn{background:#fff6e5;border:1px solid #f0b429;padding:8px}.foot{margin-top:15px;border-top:1px solid #bcccdc;padding-top:7px;color:#52606d;font-size:9pt}</style></head><body>

$summary_cards

<h2>三、估值面分析（5项）</h2>$valuation

<h2>五、消息与市场情绪（4项）</h2>$sentiment

<div class="foot">$disclaimer</div></body></html>
